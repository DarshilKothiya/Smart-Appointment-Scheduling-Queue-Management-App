name: smart_appointment
description: Smart Appointment Scheduling & Queue Management App
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State Management
  provider: ^6.1.2

  # Local Database
  sqflite: ^2.3.3+1
  path: ^1.9.0

  # Unique IDs
  uuid: ^4.4.0

  # Date formatting
  intl: ^0.19.0

  # Connectivity
  connectivity_plus: ^6.0.3

  # Shared Preferences
  shared_preferences: ^2.2.3

  # Icons
  cupertino_icons: ^1.0.6

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  fonts:
    - family: Poppins
      fonts:
        - asset: assets/fonts/Poppins-Regular.ttf
        - asset: assets/fonts/Poppins-Medium.ttf
          weight: 500
        - asset: assets/fonts/Poppins-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Poppins-Bold.ttf
          weight: 700
